name: Deploy

# Deploys to Azure App Service on every push to main.
# Requires GitHub secret: AZURE_PUBLISH_PROFILE
# (download from Azure Portal → App Service → Get Publish Profile)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Build Angular (outputs to apps/api/wwwroot)
        working-directory: apps/web
        run: |
          npm ci
          npm run build

      - name: Publish .NET (includes wwwroot from Angular build)
        run: dotnet publish apps/api/StreamerTinder.Api.csproj -c Release -o publish

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: streamer-tinder
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
          package: ./publish
