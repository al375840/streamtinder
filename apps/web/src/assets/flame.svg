<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="outer" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%"   stop-color="#FFC641"/>
      <stop offset="45%"  stop-color="#FF6B35"/>
      <stop offset="100%" stop-color="#A8324A"/>
    </linearGradient>
    <linearGradient id="inner" x1="50%" y1="20%" x2="50%" y2="100%">
